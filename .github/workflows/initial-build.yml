name: initial-build
on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'data/universities_seed.csv'
      - '.github/workflows/initial-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run build_master.py (institution resolution)
        run: python scripts/build_master.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Run sync_researchers.py (OpenAlex data sync)
        run: python scripts/sync_researchers.py
        env:
          PYTHONUNBUFFERED: 1
          MAX_PER_INST: "120"

      - name: Commit & push data changes
        run: |
          git config user.name "ask-the-world-bot"
          git config user.email "sharekyoto@gmail.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "build: sync researchers ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
            git push
          fi
