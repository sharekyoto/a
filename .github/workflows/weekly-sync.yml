name: Weekly Data Sync

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build institutions
        env:
          MAILTO: sharekyoto@gmail.com
        run: python3 scripts/build_master.py

      - name: Sync researchers
        env:
          MAILTO: sharekyoto@gmail.com
          MAX_PER_INST: '120'
        run: python3 scripts/sync_researchers.py

      - name: Commit changes
        run: |
          git config user.name "Ask the World Bot"
          git config user.email "sharekyoto@gmail.com"
          git add data/institutions.json data/researchers.json data/site_data.json
          git diff --cached --quiet || git commit -m "data: weekly sync $(date -u +'%Y-%m-%d')"

      - name: Push
        run: git push origin main
