name: summaries

# 研究者の日本語要約を「少しずつ・無料」で作り置きする夜間ジョブ。
#  - Gemini 2.5 Flash-Lite 無料枠(1日1,500・カード不要)を使用。
#  - 1回 DAILY_CAP 人だけ生成 → data/summaries.json に追記コミット。
#  - 課金回避: 無料キーに Billing を紐付けないこと(超過しても課金されず止まるだけ)。
# 必要な Secret: GEMINI(Google AI Studio の無料APIキー)。未設定ならスキップして無害に終了。

on:
  workflow_dispatch:
    inputs:
      cap:
        description: "1回に生成する最大人数(初回は少量で請求確認を推奨)"
        required: false
        default: "200"
  schedule:
    - cron: "0 20 * * *"      # 05:00 JST 毎日(sync とは別時間)

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Japanese summaries (capped)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI }}
          # 手動実行時は入力値、夜間自動は控えめに 800(1日あたり数円)。
          DAILY_CAP: ${{ github.event.inputs.cap || '800' }}
        run: python scripts/generate_summaries.py

      - name: Commit summaries
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summaries.json
          if git diff --staged --quiet; then
            echo "No new summaries."
          else
            git pull --rebase --autostash origin main || true
            git commit -m "data: japanese summaries (incremental)"
            git push
          fi
