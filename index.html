<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>きみの「なぜ」から、師匠を探す | Ask the World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF7EF; --ink:#1C2A45; --ink-soft:#4A576E;
    --coral:#E8643C; --teal:#2C7A6B; --line:#E3DBCB; --card:#FFFFFF;
    --shadow:0 1px 2px rgba(28,42,69,.05), 0 8px 24px rgba(28,42,69,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Zen Kaku Gothic New",system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6}
  body[data-lang="en"]{font-family:"Inter","Zen Kaku Gothic New",system-ui,sans-serif}
  .wrap{max-width:900px;margin:0 auto;padding:clamp(20px,5vw,52px) clamp(16px,4vw,32px)}
  header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:clamp(20px,4vw,34px)}
  .brand .eyebrow{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--coral);margin:0 0 6px}
  .brand h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(26px,5.5vw,42px);line-height:1.05;margin:0;letter-spacing:-.01em}
  .brand .sub{color:var(--ink-soft);font-size:14px;margin-top:9px;max-width:46ch}
  .lang{flex-shrink:0;display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;font-family:"Space Mono",monospace;font-size:12px}
  .lang button{border:0;background:transparent;color:var(--ink-soft);padding:7px 13px;cursor:pointer}
  .lang button[aria-pressed="true"]{background:var(--ink);color:var(--paper)}

  .aboutlink{margin-top:14px;border:0;background:transparent;color:var(--coral);font-family:inherit;font-size:13.5px;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:3px}
  .about-ov{position:fixed;inset:0;background:rgba(28,42,69,.5);display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow:auto;z-index:50}
  .about-ov[hidden]{display:none}
  .about-card{background:var(--paper);max-width:680px;width:100%;border-radius:18px;padding:clamp(24px,5vw,44px);position:relative;box-shadow:0 20px 60px rgba(28,42,69,.3);margin:auto}
  .about-x{position:absolute;top:12px;right:16px;border:0;background:transparent;font-size:28px;line-height:1;color:var(--ink-soft);cursor:pointer}
  .about-card h2{font-family:"Fraunces",serif;font-size:clamp(22px,4vw,30px);margin:0 0 8px;color:var(--ink)}
  .about-card .lead{color:var(--ink-soft);font-size:14.5px;line-height:1.85;margin:0 0 8px}
  .about-card h3{font-size:15px;margin:24px 0 5px;color:var(--coral)}
  .about-card p{font-size:14px;line-height:1.85;color:var(--ink);margin:0}
  .about-card .end{margin-top:28px;padding-top:18px;border-top:1px solid var(--line);font-family:"Fraunces",serif;font-size:16px;line-height:1.75;color:var(--ink)}
  .growth{margin:0 0 20px;padding:13px 16px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,rgba(44,122,107,.06),rgba(44,122,107,.02))}
  .growth .nums{display:flex;flex-wrap:wrap;gap:18px}
  .growth .n{font-family:"Space Mono",monospace}
  .growth .n b{font-size:19px;color:var(--teal);font-weight:700}
  .growth .n span{font-size:12px;color:var(--ink-soft);margin-left:5px}
  .growth .msg{margin-top:8px;font-size:12.5px;color:var(--ink-soft)}
  .tabs{display:flex;gap:8px;margin-bottom:26px}
  .tabs button{flex:1;border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);
    border-radius:13px;padding:13px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
  .tabs button[aria-selected="true"]{border-color:var(--ink);background:var(--ink);color:var(--paper)}

  .panel{display:none} .panel.on{display:block}

  /* clusters / questions */
  .cluster{margin-bottom:14px;border:1px solid var(--line);border-radius:16px;background:var(--card);overflow:hidden}
  .cluster>summary{list-style:none;cursor:pointer;padding:16px 18px;display:flex;align-items:center;gap:12px;font-weight:500}
  .cluster>summary::-webkit-details-marker{display:none}
  .cluster .ic{font-size:22px}
  .cluster .cap{font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-soft);margin-left:auto}
  .qlist{padding:4px 14px 16px;display:flex;flex-direction:column;gap:8px}
  .q{text-align:left;cursor:pointer;border:1px solid var(--line);background:var(--paper);border-radius:12px;
    padding:13px 15px;font-family:"Fraunces",serif;font-size:16.5px;color:var(--ink);line-height:1.35}
  .q:hover{border-color:var(--coral);color:var(--coral);transform:translateX(2px);transition:.15s}

  /* school search */
  .search{display:flex;gap:10px;flex-wrap:wrap}
  .search input{flex:1;min-width:220px;border:1.5px solid var(--line);background:var(--card);border-radius:14px;padding:15px 18px;font-size:16px;color:var(--ink);font-family:inherit}
  .search input:focus{outline:none;border-color:var(--coral);box-shadow:0 0 0 4px rgba(232,100,60,.12)}
  .search button{border:0;background:var(--ink);color:var(--paper);border-radius:14px;padding:0 24px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
  .hint{color:var(--ink-soft);font-size:13px;margin:11px 2px 0}
  .inst{display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;font-family:inherit}
  .inst:hover{border-color:var(--coral)} .inst .flag{font-size:24px} .inst .nm{font-weight:500;font-size:16px}
  .inst .meta{color:var(--ink-soft);font-size:12.5px;font-family:"Space Mono",monospace}

  /* shared results */
  .crumb{display:flex;align-items:center;gap:10px;margin:6px 0 4px;flex-wrap:wrap}
  .back{border:0;background:transparent;color:var(--coral);cursor:pointer;font-family:"Space Mono",monospace;font-size:13px;padding:4px 0}
  .head{margin:14px 0 4px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .head .flag{font-size:28px}
  .head h2{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(21px,4vw,28px);margin:0;line-height:1.2}
  .head .count{font-family:"Space Mono",monospace;font-size:12px;color:var(--ink-soft)}
  .note{color:var(--ink-soft);font-size:12.5px;margin:3px 0 20px;max-width:62ch}
  .status{margin-top:22px;color:var(--ink-soft);font-size:14px} .status.err{color:var(--coral)}
  .comeback{margin-top:20px;padding:18px 20px;border:1px solid rgba(232,100,60,.3);background:rgba(232,100,60,.06);border-radius:16px}
  .comeback b{display:block;font-family:"Fraunces",serif;font-size:17px;color:var(--ink);margin-bottom:6px}
  .comeback div{font-size:13.5px;color:var(--ink-soft);line-height:1.75}
  .growfoot{margin-top:16px;text-align:center;font-size:12px;color:var(--ink-soft);font-family:"Space Mono",monospace}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:19px 21px;margin-bottom:13px;box-shadow:var(--shadow)}
  .card .top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
  .card .name{font-family:"Fraunces",serif;font-weight:600;font-size:19px;margin:0;line-height:1.2}
  .card .name a{color:var(--ink);text-decoration:none} .card .name a:hover{color:var(--coral)}
  .card .aff{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
  .stats{display:flex;gap:15px;flex-shrink:0;font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-soft);text-align:right}
  .stats b{display:block;font-size:15px;color:var(--ink);font-weight:700}
  .topics{margin-top:13px;display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-size:12.5px;background:rgba(44,122,107,.09);color:var(--teal);border:1px solid rgba(44,122,107,.22);border-radius:999px;padding:4px 11px}
  .subtopics{margin-top:8px;font-size:11.5px;color:#9AA0AE;font-family:"Space Mono",monospace;line-height:1.5}
  .summary{margin-top:10px;font-size:13.5px;color:var(--ink);line-height:1.6}
  .vibe{margin-top:10px;font-size:12px;color:var(--teal)}
  .links{margin-top:13px;display:flex;gap:14px;font-size:13px;font-family:"Space Mono",monospace}
  .links a{color:var(--coral);text-decoration:none} .links a:hover{text-decoration:underline}
  .more{display:block;margin:8px auto 0;border:1.5px solid var(--ink);background:transparent;color:var(--ink);border-radius:14px;padding:12px 28px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
  .more:hover{background:var(--ink);color:var(--paper)} .more:disabled{opacity:.4}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--coral);border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:8px}
  @keyframes s{to{transform:rotate(360deg)}}
  footer{margin-top:42px;padding-top:18px;border-top:1px solid var(--line);color:var(--ink-soft);font-size:12px;font-family:"Space Mono",monospace}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body data-lang="ja">
<div class="wrap">
  <header>
    <div class="brand">
      <p class="eyebrow" data-i="eyebrow"></p>
      <h1 data-i="title"></h1>
      <p class="sub" data-i="sub"></p>
      <button id="aboutBtn" class="aboutlink" data-i="aboutlink"></button>
    </div>
    <div class="lang" role="group" aria-label="language">
      <button data-set="ja" aria-pressed="true">JP</button>
      <button data-set="en" aria-pressed="false">EN</button>
    </div>
  </header>

  <div id="growth" class="growth" hidden></div>

  <div class="tabs" role="tablist">
    <button id="t-k" role="tab" aria-selected="true" data-i="tab_k"></button>
    <button id="t-q" role="tab" aria-selected="false" data-i="tab_q"></button>
    <button id="t-s" role="tab" aria-selected="false" data-i="tab_s"></button>
  </div>

  <!-- キーワードから探す -->
  <section id="p-k" class="panel on">
    <div class="search">
      <input id="kq" type="text" autocomplete="off" />
      <button id="kgo" data-i="kgo"></button>
    </div>
    <p class="hint" data-i="khint2"></p>
    <div id="kresults"></div>
  </section>

  <!-- 問いから探す -->
  <section id="p-q" class="panel">
    <div id="qtree"></div>
    <div id="qresults"></div>
  </section>

  <!-- 学校から探す -->
  <section id="p-s" class="panel">
    <div class="search">
      <input id="q" type="text" autocomplete="off" />
      <button id="go" data-i="go"></button>
    </div>
    <p class="hint" data-i="hint"></p>
    <div id="status" class="status" hidden></div>
    <div id="pick"></div>
    <div id="sresults"></div>
  </section>

  <footer data-i="foot"></footer>
</div>

<div id="about" class="about-ov" hidden>
  <div class="about-card">
    <button id="aboutClose" class="about-x" aria-label="close">×</button>
    <div id="aboutBody"></div>
  </div>
</div>

<script>
/* ライブAPIゼロ: ブラウザからは OpenAlex を一切叩かない。データは夜間ビルドの静的JSONのみ。
   研究者ページへの https://openalex.org/<id> リンクは外部リンク(APIコールではない)。 */

const T={
  ja:{eyebrow:"好奇心は、いちばんの才能だ", title:"きみの「なぜ」から、師匠を探す",
    sub:"心が動いた言葉で検索してみよう。それを“今まさに”研究している日本の先生に出会える。名前を押せば、その人の世界をもっと深く掘りにいける。きみの探究が、この地図を育てていく。",
    tab_q:"問いから探す", tab_s:"学校から探す", tab_k:"キーワードで探す",
    kgo:"探す", khint:"気になる言葉（例:再生医療、ブラックホール、AI）",
    khint2:"気になる言葉を入れると、それを研究している先生が活動量順に出ます。言葉が浮かばないときは「問いから探す」へ。",
    knone:"その言葉に近い先生はまだ見つかりませんでした。別の言い方や「問いから探す」も試してみてください。",
    kcount:"人の先生",
    go:"探す", hint:"例:京都大学 / 東北大学 / 早稲田大学 / 看護",
    pick:"どの学校ですか?", searching:"学校をさがしています…", loading:"よみこんでいます…",
    none:"見つかりませんでした。英語名でも試してみてください。", nores:"この学校の研究者はまだ見つかりませんでした。",
    err:"うまく接続できませんでした。少し待ってもう一度。",
    count:"人", more:"もっと見る", back:"← 問いにもどる",
    qnote:"この問いとつながる分野の研究者を、活動量の多い順に表示しています。", inthis:"の研究者",
    works:"論文", cited:"被引用", h:"h指数", profile:"OpenAlex", dig:"この先生を深掘り",
    gcountry:"カ国", gschool:"学校", gpref:"都道府県", gppl:"人の研究者", grow_t:"育ち続ける地図", gmsg:"きみの検索が、次の誰かの探索の道しるべになる。", aboutlink:"このサイトについて ▸",
    cbT:"「{q}」のまわりは、まだ育ち途中。", cbB:"この地図は毎晩少しずつ大きくなっています。次の更新まで約{H}時間。そのころにまた、会いに来てね。🌱", growFoot:"🌱 この地図は毎晩育っています。次の更新まで約{H}時間。",
    foot:"データ: OpenAlex（CC0・全世界）"},
  en:{eyebrow:"Curiosity is your greatest talent", title:"From your “why” to a mentor",
    sub:"Search a word that moves you and meet a researcher in Japan exploring it right now. Tap a name to dig deeper into their world — your curiosity grows this map.",
    tab_q:"By question", tab_s:"By school", tab_k:"By keyword",
    kgo:"Search", khint:"a word you're curious about (e.g. regenerative medicine, black holes, AI)",
    khint2:"Type a word and meet researchers working on it, sorted by activity. Not sure what to type? Try 'By question'.",
    knone:"No close match yet. Try another wording, or 'By question'.",
    kcount:"researchers",
    go:"Search", hint:"e.g. Kyoto University / Tohoku University / Waseda / nursing",
    pick:"Which one?", searching:"Looking up the school…", loading:"Loading…",
    none:"No match. Try the English name.", nores:"No researchers found for this school yet.",
    err:"Couldn't connect. Try again in a moment.",
    count:"", more:"Show more", back:"← Back to questions",
    qnote:"Researchers in fields connected to this question, sorted by research activity.", inthis:"researchers",
    works:"works", cited:"cited", h:"h-index", profile:"OpenAlex", dig:"Dig deeper",
    gcountry:"countries", gschool:"schools", gpref:"prefectures", gppl:"researchers", grow_t:"A map that keeps growing", gmsg:"your search becomes a signpost for the next explorer.", aboutlink:"About ▸",
    cbT:"“{q}” is still growing here.", cbB:"This map gets a little bigger every night. Next update in about {H}h — come back and see then. 🌱", growFoot:"🌱 Growing every night. Next update in about {H}h.",
    foot:"Data: OpenAlex (CC0 · global)"}
};
let lang="ja", SITE=null, QDATA=null, LEX=null, IDATA=null, SUM={};

/* ---- fallback sample so the page renders before the pipeline runs ---- */
const SAMPLE_QUESTIONS={clusters:[
  {id:"sky",icon:"🌌",label:{ja:"宇宙と天文",en:"Sky & Universe"},questions:[
    {id:"u",q:{ja:"宇宙は、どこまで広がっているんだろう？",en:"How far does the universe stretch?"},fields:["31","19"]}]},
  {id:"life",icon:"🧬",label:{ja:"生命と身体",en:"Life & Body"},questions:[
    {id:"b",q:{ja:"脳は、どうやって考えているの？",en:"How does the brain think?"},fields:["28","32"]}]},
  {id:"logic",icon:"🔢",label:{ja:"数・情報",en:"Numbers & Data"},questions:[
    {id:"ai",q:{ja:"AIは、どんな仕組みで「考える」の？",en:"How does AI 'think'?"},fields:["17"]}]}
]};
const SAMPLE_SITE={researchers:[
  {id:"S1",name:"(sample) Aiko Tanaka",inst:"Kyoto University",country:"JP",works:120,cited:9000,h:42,topics:["Quantum Optics","Photonics"],fields:["31"]},
  {id:"S2",name:"(sample) John Rivera",inst:"MIT",country:"US",works:90,cited:7000,h:38,topics:["Machine Learning","Neural Networks"],fields:["17"]},
  {id:"S3",name:"(sample) Sofia Müller",inst:"ETH Zurich",country:"CH",works:75,cited:5200,h:33,topics:["Cognitive Neuroscience"],fields:["28","32"]}
]};

function flag(cc){ if(!cc||cc.length!==2) return "🌐";
  return String.fromCodePoint(...[...cc.toUpperCase()].map(c=>127397+c.charCodeAt(0))); }

// 軽いファイルだけ先に読む(即・画面表示用)。重い site_data.json は待たない。
async function loadLight(){
  try{ QDATA=await (await fetch("./data/questions.json")).json(); }catch(e){ QDATA=SAMPLE_QUESTIONS; }
  try{ LEX=await (await fetch("./data/lexicon.json")).json(); }catch(e){ LEX={fields:{},subfields:{}}; }
  try{ IDATA=await (await fetch("./data/institutions.json")).json(); }catch(e){ IDATA=[]; }
  try{ const sd=await (await fetch("./data/summaries.json")).json(); SUM=(sd&&sd.summaries)||sd||{}; }catch(e){ SUM={}; }
}
// 重い研究者データ(約19MB)は裏で1回だけ読み込む。検索時はこれの完了を待つ。
let siteReady=false, sitePromise=null;
function loadSite(){
  if(sitePromise) return sitePromise;
  sitePromise=(async()=>{
    try{ SITE=await (await fetch("./data/site_data.json")).json(); }catch(e){ SITE=SAMPLE_SITE; }
    siteReady=true;
    renderGrowth();   // 研究者数が確定したので成長メーターを更新
  })();
  return sitePromise;
}
async function ensureSite(box){   // 検索前に site_data の読み込み完了を保証(未完なら案内)
  if(siteReady) return;
  if(box){ box.innerHTML='<p class="status"><span class="spin"></span>'+(lang==="ja"?"研究者データを読み込み中…":"Loading researchers…")+'</p>'; }
  await loadSite();
}
/* ---- lexicon helpers (output: 和訳 / input: 橋渡し) ---- */
function fieldJa(fid){ const e=LEX&&LEX.fields&&LEX.fields[fid]; return e?(e.ja||e.en):fid; }
// 研究者の field id 群 → 日本語の分野ラベル配列(重複除去・最大3)
function fieldLabels(r){
  const seen=new Set(), out=[];
  (r.fields||[]).forEach(f=>{ const j=fieldJa(String(f)); if(j&&!seen.has(j)){ seen.add(j); out.push(j); } });
  return out.slice(0,3);
}
// 成長メーター: 学校・都道府県は institutions.json から即時、研究者数は site_data 読込後に確定。
function renderGrowth(){
  const el=document.getElementById("growth"); if(!el) return;
  const list=Array.isArray(IDATA)?IDATA:((IDATA&&IDATA.institutions)||[]);
  const schools=new Set(), prefs=new Set(), countries=new Set();
  list.forEach(i=>{ const en=i.resolved_name||i.name||i.name_en; if(en) schools.add(en); if(i.prefecture) prefs.add(i.prefecture); if(i.country) countries.add(i.country); });
  if(!schools.size){ el.hidden=true; return; }
  const rows=siteReady?(Array.isArray(SITE)?SITE:((SITE&&SITE.researchers)||[])):null;
  const ppl=rows?rows.length.toLocaleString():"…";
  el.hidden=false;
  el.innerHTML=`<div class="nums">
    <span class="n"><b>${countries.size||1}</b><span>${T[lang].gcountry}</span></span>
    <span class="n"><b>${schools.size.toLocaleString()}</b><span>${T[lang].gschool}</span></span>
    <span class="n"><b>${prefs.size}</b><span>${T[lang].gpref}</span></span>
    <span class="n"><b>${ppl}</b><span>${T[lang].gppl}</span></span>
  </div><div class="msg">🌱 ${T[lang].grow_t} — ${T[lang].gmsg}</div>`;
}

function applyLang(){
  document.body.dataset.lang=lang; document.documentElement.lang=lang;
  for(const el of document.querySelectorAll("[data-i]")) el.textContent=T[lang][el.dataset.i];
  document.getElementById("q").placeholder=T[lang].hint.replace(/^(例:|e\.g\. )/,"");
  document.getElementById("kq").placeholder=T[lang].khint;
  document.querySelectorAll(".lang button").forEach(b=>b.setAttribute("aria-pressed",b.dataset.set===lang));
  renderTree();
  renderGrowth();
}
document.querySelectorAll(".lang button").forEach(b=>b.onclick=()=>{lang=b.dataset.set;applyLang();});

/* ---- tabs ---- */
function tab(which){
  ["k","q","s"].forEach(w=>{
    document.getElementById("t-"+w).setAttribute("aria-selected",which===w);
    document.getElementById("p-"+w).classList.toggle("on",which===w);
  });
}
document.getElementById("t-k").onclick=()=>tab("k");
document.getElementById("t-q").onclick=()=>tab("q");
document.getElementById("t-s").onclick=()=>tab("s");

/* ---- question tree ---- */
function renderTree(){
  const root=document.getElementById("qtree"); root.innerHTML="";
  document.getElementById("qresults").innerHTML="";
  (QDATA.clusters||[]).forEach(c=>{
    const d=document.createElement("details"); d.className="cluster";
    const s=document.createElement("summary");

// Phase2: 検索語を無料Googleフォームに記録(鍵不要)。URL/フィールド未設定なら何もしない。
// 設定後、夜間ジョブが「探された言葉/大学」を優先して充実させる。
const SEARCH_LOG_URL="";    // 例: https://docs.google.com/forms/d/e/XXXX/formResponse
const SEARCH_LOG_FIELD="";  // 例: entry.1234567890
function logSearch(q,type){
  if(!SEARCH_LOG_URL||!SEARCH_LOG_FIELD||!q) return;
  try{ const b=new URLSearchParams(); b.append(SEARCH_LOG_FIELD,(type||"")+":"+q);
    fetch(SEARCH_LOG_URL,{method:"POST",mode:"no-cors",body:b}); }catch(e){}
}
// 次の夜間更新(18:00 UTC = 03:00 JST)までの概算時間。「また来てね」を正直に出すため。
function hoursToUpdate(){
  const now=new Date();
  let n=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),18,0,0));
  if(now>=n) n.setUTCDate(n.getUTCDate()+1);
  return Math.max(1,Math.round((n-now)/3600000));
}
function fillTpl(s,q){ return s.replace("{H}",hoursToUpdate()).replace("{q}",q||""); }
function comebackBlock(q){
  return `<div class="comeback"><b>${fillTpl(T[lang].cbT,q)}</b><div>${fillTpl(T[lang].cbB,q)}</div></div>`;
}
// 大きな数を日本語で丸める(高校生に読みやすく): 806336 → 約81万 / 9000 → 約9千
function jaNum(n){ n=Number(n)||0;
  if(n>=100000000) return "約"+(Math.round(n/10000000)/10)+"億";
  if(n>=10000) return "約"+Math.round(n/10000)+"万";
  if(n>=1000) return "約"+(Math.round(n/100)/10)+"千";
  return ""+n;
}
/* ---- card (works for both site_data and live OpenAlex shapes) ---- */
function card(r,fromSite){
  const c=document.createElement("div"); c.className="card";
  const oid=r.id.replace("https://openalex.org/","");
  const name=r.name, inst=r.inst||r.inst_name||"", cc=r.country;
  const works=r.works??r.works_count??0, cited=r.cited??r.cited_by_count??0;
  const fieldChips=fieldLabels(r).map(j=>`<span class="chip">${j}</span>`).join("");
  const sumJa=(r.id&&SUM&&SUM[r.id]&&SUM[r.id].ja)||"";   // AI日本語要約(あれば。無ければ分野チップが説明役)
  const orcid=r.orcid?`<a href="${r.orcid}" target="_blank" rel="noopener">ORCID ↗</a>`:"";
  // 名前クリック → Google AI モードで「自分で深掘り」するきっかけに(新タブ)
  const digQ=`${name}${inst?`（${inst}）`:""}はどんな研究をしている研究者ですか？高校生にもわかるように教えて`;
  const digHref=`https://www.google.com/search?udm=50&q=${encodeURIComponent(digQ)}`;
  // 指標は「活躍度」風に。数値は丸めて日本語で、応援したくなるトーンに。
  const vibe = lang!=="ja"
    ? `${works.toLocaleString()} works · ${cited.toLocaleString()} cited`
    : (cited>=1
        ? `🌱 研究を ${jaNum(works)}本 ・ 🌍 世界で ${jaNum(cited)}回 注目された先生`
        : `🌱 研究を ${jaNum(works)}本 発表 ・ これからが楽しみな先生`);
  c.innerHTML=`
    <div class="top">
      <div><h3 class="name"><a href="${digHref}" target="_blank" rel="noopener">${name}</a></h3>
        <div class="aff">${flag(cc)} ${inst}</div></div>
    </div>
    <div class="topics">${fieldChips}</div>
    ${sumJa?`<div class="summary">${sumJa}</div>`:""}
    <div class="vibe">${vibe}</div>
    <div class="links"><a href="${digHref}" target="_blank" rel="noopener">${T[lang].dig} ↗</a><a href="https://openalex.org/${oid}" target="_blank" rel="noopener">${T[lang].profile} ↗</a>${orcid}</div>`;
  return c;
}

// 機関インデックスを一度だけ構築: institutions.json(和名)× site_data(所属研究者)を resolved_name で結合
let SINDEX=null;
function buildInstIndex(){
  if(SINDEX) return SINDEX;
  const rows=Array.isArray(SITE)?SITE:((SITE&&SITE.researchers)||[]);
  const byInst={};
  rows.forEach(r=>{ const k=r.inst||""; if(k){ (byInst[k]=byInst[k]||[]).push(r); } });
  // institutions.json は list でも {institutions:[…]} でも動くよう正規化
  const list=Array.isArray(IDATA)?IDATA:((IDATA&&IDATA.institutions)||[]);
  SINDEX=list.map(i=>{
    const en=i.resolved_name||i.name||i.name_en||"";
    const people=byInst[en]||[];
    return { ja:i.name_ja||"", en, pref:i.prefecture||"", country:i.country||(people[0]&&people[0].country)||"JP", people };
  }).filter(x=>x.people.length);
  return SINDEX;
}
function searchSchool(query){

/* ---- keyword → field/subfield resolve (client-side, no live API, no key) ----
   lexicon.json の aliases/ja/en を走査して field/subfield ID を特定。
   短い英字クエリ(<=3)は単語境界を要求して "ai"→"brain" 等の誤爆を防ぐ。 */
function lexMatch(q, e){
  const ascii=/^[a-z0-9]+$/.test(q);
  const hay=[e.ja,e.en,...(e.aliases||[])].filter(Boolean).map(s=>String(s).toLowerCase());
  for(const h of hay){
    if(h===q) return true;
    if(q.length>=2 && h.includes(q)){
      if(ascii && q.length<=3){ if(new RegExp("\\b"+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).test(h)) return true; }
      else return true;
    }
    if(h.length>=2 && q.includes(h)) return true;
  }
  return false;
}
// 入力 → {ids:Set<field id>, terms:[topics文字列のピンポイント照合語]}
//  ids   = field 一致(分野で広く拾う)
//  terms = ピンポイント照合語。keywords辞書(日本語/英字→英語トピック語)＋長い英字入力。
//          四半期キャッチー語は lexicon.json の keywords に1行足すだけで検索可能になる。
function kwHit(q, key){
  const k=key.toLowerCase();
  if(/^[a-z0-9]+$/.test(k) && k.length<=3) return new RegExp("\\b"+k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).test(q); // 短い英字は語境界
  return q.includes(k) || (k.length>=2 && q.includes(k));
}
function resolveQuery(input){
  const q=input.trim().toLowerCase();
  const ids=new Set(), terms=new Set();
  if(/^[a-z0-9 ]+$/.test(q) && q.length>=4) terms.add(q);          // 英語キーワードはそのまま具体トピック照合
  const kw=(LEX&&LEX.keywords)||{};
  for(const key in kw){ if(kwHit(q,key)) (kw[key]||[]).forEach(t=>terms.add(String(t).toLowerCase())); }
  const fields=(LEX&&LEX.fields)||{};
  for(const fid in fields){ if(lexMatch(q,fields[fid])) ids.add(fid); }
  return {ids, terms:[...terms]};
}
function kwAll(){ return Array.isArray(SITE)?SITE:((SITE&&SITE.researchers)||[]); }
let kShown=0, kMatched=[];
function kwNote(msg){ const out=document.getElementById("kresults"); out.innerHTML="";
  const p=document.createElement("p"); p.className="status err"; p.textContent=msg; out.appendChild(p); }
function kwSearch(query){
  const {ids,terms}=resolveQuery(query);
  const out=document.getElementById("kresults"); out.innerHTML="";
  logSearch(query,"kw");
  if(!ids.size && !terms.length){ out.innerHTML=comebackBlock(query); return; }
  // ハイブリッド: field 一致で広く拾い、topics 文字列一致でピンポイント加点
  kMatched=kwAll().map(r=>{
    let score=0;
    if(ids.size && (r.fields||[]).some(f=>ids.has(String(f)))) score+=1;
    if(terms.length){
      const tops=(r.topics||[]).map(t=>(typeof t==="string"?t:(t.display_name||"")).toLowerCase());
      terms.forEach(term=>{ if(tops.some(tp=>tp.includes(term))) score+=2; });
    }
    return {r,score};
  }).filter(x=>x.score>0)
    .sort((a,b)=> b.score-a.score || (b.r.cited||b.r.cited_by_count||0)-(a.r.cited||a.r.cited_by_count||0))
    .map(x=>x.r);
  if(!kMatched.length){ out.innerHTML=comebackBlock(query); return; }
  const head=document.createElement("div"); head.className="head";
  head.innerHTML=`<h2>“${query}”</h2><span class="count">${kMatched.length.toLocaleString()} ${T[lang].kcount}</span>`;
  out.appendChild(head);
  const note=document.createElement("p"); note.className="note"; note.textContent=T[lang].qnote;
  out.appendChild(note);
  out.appendChild(document.createElement("div")).id="kcards";
  kShown=0; moreK();
  // 結果が少ないときは「また来てね」、十分あるときも控えめに成長を予告(がっかりさせない)
  if(kMatched.length<5){ const d=document.createElement("div"); d.innerHTML=comebackBlock(query); out.appendChild(d.firstElementChild); }
  else { const p=document.createElement("p"); p.className="growfoot"; p.textContent=fillTpl(T[lang].growFoot,query); out.appendChild(p); }
}
function moreK(){
  const box=document.getElementById("kcards");
  const old=document.getElementById("kmore"); if(old) old.remove();
  kMatched.slice(kShown,kShown+10).forEach(r=>box.appendChild(card(r,true)));
  kShown+=10;
  if(kShown<kMatched.length){
    const b=document.createElement("button"); b.id="kmore"; b.className="more"; b.textContent=T[lang].more;
    b.onclick=moreK; document.getElementById("kresults").appendChild(b);
  }
}
