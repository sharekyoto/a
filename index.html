<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問いから探す大学検索 | Ask the World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#15232B;          /* 墨 */
  --paper:#F2F5F7;        /* 朝の空 */
  --card:#FFFFFF;
  --lapis:#2B4C8C;        /* 瑠璃 — 主役 */
  --lapis-deep:#1B3260;
  --amber:#E8A33D;        /* 山吹 — 問いの色 */
  --mist:#C6D2DB;
  --quiet:#5B6E7A;
  --line:#DCE4E9;
  --radius:14px;
  --font-display:'Shippori Mincho B1', serif;
  --font-body:'Zen Kaku Gothic New', sans-serif;
  --font-data:'IBM Plex Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--paper);
  color:var(--ink);
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}

/* ===== Header ===== */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(242,245,247,.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.header-inner{
  max-width:1080px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
}
.logo{font-family:var(--font-display);font-weight:800;font-size:1.05rem;letter-spacing:.04em}
.logo .q{color:var(--amber)}
.lang-toggle{
  display:flex;border:1.5px solid var(--lapis);border-radius:999px;overflow:hidden;
  font-family:var(--font-data);font-size:.78rem;
}
.lang-toggle button{
  background:none;border:none;padding:6px 14px;cursor:pointer;
  font-family:inherit;font-size:inherit;color:var(--lapis);
}
.lang-toggle button.active{background:var(--lapis);color:#fff}
.lang-toggle button:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}

/* ===== Demo banner ===== */
.demo-banner{
  background:var(--lapis-deep);color:#fff;text-align:center;
  font-size:.78rem;padding:7px 16px;letter-spacing:.03em;
}
.demo-banner strong{color:var(--amber)}

/* ===== Hero ===== */
.hero{
  max-width:1080px;margin:0 auto;
  padding:56px 20px 36px;
  text-align:center;
}
.hero-eyebrow{
  font-family:var(--font-data);font-size:.75rem;color:var(--quiet);
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:18px;
}
.hero h1{
  font-family:var(--font-display);font-weight:800;
  font-size:clamp(1.6rem,5vw,2.6rem);
  line-height:1.45;letter-spacing:.02em;
}
.hero h1 .mark{
  position:relative;white-space:nowrap;
}
.hero h1 .mark::after{
  content:"";position:absolute;left:0;right:0;bottom:.08em;height:.32em;
  background:var(--amber);opacity:.35;z-index:-1;border-radius:2px;
}
.hero p.lede{
  margin:18px auto 0;max-width:560px;color:var(--quiet);font-size:.95rem;
}

/* ===== 問いのチケッター(signature) ===== */
.toi-ticker{
  margin:30px auto 0;max-width:640px;
  font-family:var(--font-display);font-weight:600;
  font-size:clamp(1rem,3vw,1.25rem);
  min-height:2.2em;color:var(--lapis-deep);
}
.toi-ticker .toi-text{display:inline-block;animation:toiIn .6s ease}
.toi-ticker .qmark{color:var(--amber);font-weight:800}
@keyframes toiIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== Search ===== */
.search-wrap{max-width:640px;margin:22px auto 0;position:relative}
.search-box{
  width:100%;padding:16px 52px 16px 20px;
  font-family:var(--font-body);font-size:1rem;
  border:2px solid var(--lapis);border-radius:999px;
  background:var(--card);color:var(--ink);
}
.search-box:focus{outline:3px solid rgba(232,163,61,.45);outline-offset:2px}
.search-icon{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  background:var(--lapis);color:#fff;font-size:1rem;
}
.chips{
  max-width:760px;margin:18px auto 0;
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
}
.chip{
  font-size:.82rem;padding:7px 14px;border-radius:999px;cursor:pointer;
  border:1px solid var(--mist);background:var(--card);color:var(--ink);
  font-family:var(--font-body);transition:border-color .15s, background .15s;
}
.chip:hover{border-color:var(--lapis)}
.chip.active{background:var(--lapis);border-color:var(--lapis);color:#fff}
.chip:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

/* ===== Filters ===== */
.filters{
  max-width:1080px;margin:34px auto 0;padding:0 20px;
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;
}
.filters .label{
  font-family:var(--font-data);font-size:.72rem;color:var(--quiet);
  letter-spacing:.12em;margin-right:2px;
}
.result-count{
  max-width:1080px;margin:14px auto 0;padding:0 20px;
  font-family:var(--font-data);font-size:.78rem;color:var(--quiet);
}

/* ===== Cards ===== */
.grid{
  max-width:1080px;margin:14px auto 60px;padding:0 20px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;
}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 22px 18px;display:flex;flex-direction:column;gap:10px;
  transition:transform .15s ease, box-shadow .15s ease;
}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(21,35,43,.09)}
.card .toi{
  font-family:var(--font-display);font-weight:600;font-size:1.02rem;
  line-height:1.6;color:var(--lapis-deep);
}
.card .toi::before{content:"Q.";color:var(--amber);font-weight:800;margin-right:.4em;font-family:var(--font-data)}
.card .who{font-size:.86rem;color:var(--quiet)}
.archive-badge{
  align-self:flex-start;font-family:var(--font-data);font-size:.68rem;
  padding:2px 10px;border-radius:999px;letter-spacing:.08em;
  background:#EFE9DC;color:#8A6D1F;border:1px solid #DCC98F;
}
.card .moved{color:var(--lapis);font-weight:700;font-size:.82rem}
.card .who b{color:var(--ink);font-weight:700}
.card .summary{font-size:.88rem}
.card .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.tag{
  font-size:.72rem;padding:3px 10px;border-radius:999px;
  background:var(--paper);border:1px solid var(--line);color:var(--quiet);
}
.sources{
  margin-top:auto;padding-top:12px;border-top:1px dashed var(--line);
  font-family:var(--font-data);font-size:.72rem;color:var(--quiet);
}
.sources .src-label{letter-spacing:.1em;margin-bottom:4px}
.sources a{color:var(--lapis);text-decoration:none;border-bottom:1px solid var(--mist)}
.sources a:hover{border-bottom-color:var(--lapis)}
.sources .checked{display:block;margin-top:5px;color:#7E8E98}
.sources .checked::before{content:"⟳ "}
.empty{
  grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--quiet);
}
.empty .big{font-family:var(--font-display);font-size:1.2rem;color:var(--ink);margin-bottom:8px}

/* ===== How it updates ===== */
.howto{
  background:var(--lapis-deep);color:#E8EEF4;
  padding:56px 20px 64px;margin-top:20px;
}
.howto-inner{max-width:880px;margin:0 auto}
.howto h2{
  font-family:var(--font-display);font-weight:800;font-size:1.4rem;
  margin-bottom:8px;
}
.howto h2 .q{color:var(--amber)}
.howto .sub{font-size:.88rem;color:#AFC2D4;margin-bottom:28px}
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.step{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  border-radius:var(--radius);padding:18px;
}
.step .step-tag{
  font-family:var(--font-data);font-size:.7rem;letter-spacing:.14em;
  color:var(--amber);margin-bottom:8px;
}
.step h3{font-size:.95rem;font-weight:700;margin-bottom:6px;color:#fff}
.step p{font-size:.82rem;color:#C3D2E0}
.step a{color:var(--amber);text-decoration:none;border-bottom:1px solid rgba(232,163,61,.4)}
footer{
  text-align:center;font-family:var(--font-data);font-size:.72rem;
  color:var(--quiet);padding:26px 20px;
}

/* ===== もっと見る / OpenAlex live fetch ===== */
.univ-section{
  max-width:1080px;margin:0 auto 40px;padding:0 20px;
}
.univ-section-header{
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid var(--lapis);padding-bottom:10px;margin-bottom:16px;
}
.univ-section-header h2{
  font-family:var(--font-display);font-weight:800;font-size:1rem;
  color:var(--lapis-deep);
}
.univ-section-header .univ-count{
  font-family:var(--font-data);font-size:.72rem;color:var(--quiet);
}
.load-more-btn{
  display:flex;align-items:center;gap:8px;
  background:none;border:1.5px solid var(--lapis);border-radius:999px;
  padding:8px 20px;font-family:var(--font-body);font-size:.85rem;
  color:var(--lapis);cursor:pointer;margin:20px auto;
  transition:background .15s,color .15s;
}
.load-more-btn:hover{background:var(--lapis);color:#fff}
.load-more-btn:disabled{opacity:.5;cursor:wait}
.load-more-btn .spinner{
  width:14px;height:14px;border:2px solid currentColor;
  border-top-color:transparent;border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
.load-more-btn.loading .spinner{display:block}
.load-more-btn.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.raw-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 20px 14px;display:flex;flex-direction:column;gap:8px;
}
.raw-card .rc-name{font-weight:700;font-size:.95rem}
.raw-card .rc-topics{font-size:.82rem;color:var(--quiet)}
.raw-card .rc-src{
  margin-top:auto;padding-top:10px;border-top:1px dashed var(--line);
  font-family:var(--font-data);font-size:.70rem;color:var(--quiet);
}
.raw-card .rc-src a{color:var(--lapis);text-decoration:none;border-bottom:1px solid var(--mist)}
.raw-card .rc-note{font-size:.75rem;color:var(--quiet);font-style:italic}
.live-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;
}

@media (max-width:480px){
  .hero{padding-top:40px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="demo-banner" id="demoBanner"></div>

<header>
  <div class="header-inner">
    <div class="logo">問い<span class="q">?</span>から探す大学検索 <span style="font-family:var(--font-data);font-size:.7rem;color:var(--quiet)">/ Ask the World</span></div>
    <div class="lang-toggle" role="group" aria-label="Language">
      <button id="btnJa" class="active" onclick="setLang('ja')">日本語</button>
      <button id="btnEn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-eyebrow" id="eyebrow"></div>
  <h1 id="heroTitle"></h1>
  <p class="lede" id="heroLede"></p>
  <div class="toi-ticker" aria-live="polite"><span class="toi-text" id="tickerText"></span></div>
  <div class="search-wrap">
    <input type="search" class="search-box" id="searchBox" autocomplete="off">
    <button class="search-icon" aria-label="Search" onclick="render()">→</button>
  </div>
  <div class="chips" id="questionChips"></div>
</section>

<div class="filters" id="fieldFilters"></div>
<div class="filters" id="regionFilters" style="margin-top:10px"></div>
<div class="result-count" id="resultCount"></div>

<main class="grid" id="grid"></main>

<div id="liveSection"></div>

<section class="howto">
  <div class="howto-inner">
    <h2 id="howtoTitle"></h2>
    <p class="sub" id="howtoSub"></p>
    <div class="steps" id="steps"></div>
  </div>
</section>

<footer id="footerText"></footer>

<script>
/* =========================================================
   問いから探す大学検索 — プロトタイプ
   実運用では professors[] を OpenAlex / researchmap / KAKEN
   から自動生成した JSON に差し替える(下部「更新の仕組み」参照)
========================================================= */

let lang = 'ja';
let activeField = 'all';
let activeRegion = 'all';

const ui = {
  ja: {
    banner: '⚠ これは<b>デモデータ</b>による試作版です。研究者は架空ですが、実運用では <strong>OpenAlex・researchmap・KAKEN</strong> の実データに自動接続されます。',

    title: '偏差値ではなく、<span class="mark">心が動く問い</span>から<br>大学と学部を探そう。',
    lede: '世界中の大学の先生たちは、それぞれ一つの「問い」を追いかけています。きみの問いに近い研究者を見つけることが、学部選びのいちばん確かな方法です。',
    searchPlaceholder: '気になる言葉を入力(例:眠り、ゲーム、気候、ことば…)',
    chipsLabel: ['なぜ人は眠るの?','AIは友だちになれる?','海はあと何年もつ?','お金より大事なものは測れる?','ことばが先か、考えが先か?','宇宙のはじまりは見える?'],
    fieldLabel: '分野でしぼる',

    results: n => `${n} 人の研究者が見つかりました`,

    liveBanner: n => `✅ 本番データで稼働中:<b>${n}人</b>の研究者(OpenAlex / researchmap 由来・週次自動更新・アーカイブ含む)`,

    moreBtnDone: n => `さらに ${n} 人を取得 — AI要約なし・出典はOpenAlex`,

    srcLabel: 'SOURCES(出典)',

    howtoTitle: 'このサイトはどうやって<span class="q">自動で</span>進化し続けるの?',
    howtoSub: '無料で公開され続けるために、データもコストも「自走する」設計になっています。',

      {tag:'STEP 2 / SYNC', h:'差分だけを毎週同期', p:'OpenAlex の「更新日フィルタ」で、前回以降に変わった研究者・論文だけを取得。GitHub Actions(無料枠)で毎週自動実行されます。'},
      {tag:'STEP 3 / TRANSLATE', h:'論文の言葉を「問い」に翻訳', p:'専門用語だらけの研究概要を、AIが中高生に届く一つの「問い」と3行の説明に書き直します。生成結果はキャッシュされ、変更があった研究者だけ再生成。'},
      {tag:'STEP 4 / TRUST', h:'出典と確認日を必ず表示', p:'すべてのカードに元データへのリンクと最終確認日を表示。AIの要約が間違っていないか、いつでも一次情報にさかのぼれます。'}
    ],
    footer: 'PROTOTYPE v0.1 — data: demo / production: OpenAlex (CC0) + researchmap + KAKEN — cost design: static hosting (¥0) + free APIs'
  },
  en: {
    banner: '⚠ This is a prototype with <b>demo data</b>. Researchers shown are fictional; the production version connects automatically to <strong>OpenAlex, researchmap and KAKEN</strong>.',
    eyebrow: 'FOR 15–17 YEAR OLDS — EXPLORE BEFORE YOU CHOOSE',
    title: 'Choose a university by the <span class="mark">question that moves you</span>,<br>not by its ranking.',
    lede: 'Every professor in the world is chasing one question. Finding a researcher whose question feels like yours is the most reliable way to choose what to study.',
    searchPlaceholder: 'Type anything (e.g. sleep, games, climate, language…)',
    chipsLabel: ['Why do we sleep?','Can AI be a friend?','How many years does the ocean have?','Can we measure what matters more than money?','Which comes first: words or thoughts?','Can we see the beginning of the universe?'],

    results: n => `${n} researchers found`,
    emptyBig: 'No researcher here yet for this question.',

    liveBanner: n => `✅ Live data: <b>${n}</b> researchers (from OpenAlex / researchmap, auto-synced weekly, archive included)`,
    archiveTag: 'Archived',

    movedTo: n => `Now at → ${n}`,

    srcLabel: 'SOURCES',

      {tag:'STEP 4 / TRUST', h:'Always show sources and dates', p:'Every card links to the original data with a last-verified date, so you can always check the primary source behind any AI summary.'}
    ],
    footer: 'PROTOTYPE v0.1 — data: demo / production: OpenAlex (CC0) + researchmap + KAKEN — cost design: static hosting ($0) + free APIs'
  }
};

/* ---- デモデータ(実運用では自動生成JSONに置換) ---- */
const demoProfessors = [
  {field:'life', region:'jp',
   toi:{ja:'なぜ生き物は、命がけで眠るのだろう?', en:'Why do living things risk their lives to sleep?'},

  {field:'ai', region:'world',
   toi:{ja:'AIは、人の気持ちを本当に理解できるのか?', en:'Can AI truly understand how people feel?'},
   name:{ja:'M. オコンクウォ(架空)', en:'M. Okonkwo (fictional)'},
   aff:{ja:'MIT メディアラボ(アメリカ)', en:'MIT Media Lab (USA)'},
   sum:{ja:'感情を読み取るAIを作りながら、「理解しているフリ」と「本当の理解」の境界線を研究。哲学と工学が混ざり合う分野です。', en:'Builds emotion-reading AI while studying the line between pretending to understand and truly understanding — where philosophy meets engineering.'},

  {field:'earth', region:'world',

/* ---- 本番データ読込: data/site_data.json があれば自動で本番モード ---- */
async function loadLive(){
  try{
    const r = await fetch('data/site_data.json');
    if(!r.ok) return;
    const d = await r.json();
    if(Array.isArray(d) && d.length){
      professors = d; liveData = true;
      renderStatic(); render(); appendLoadMoreButtons();
    }
  }catch(e){ /* ファイルなし → デモのまま */ }
}

/* ---- ticker ---- */
let tickerIdx = 0;
function tick(){
  const qs = ui[lang].chipsLabel;
  const el = document.getElementById('tickerText');
  const q = qs[tickerIdx % qs.length];
  el.innerHTML = '「' + q.replace(/[??]$/, '') + '<span class="qmark">?</span>」';
  el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
  tickerIdx++;
}
setInterval(tick, 3400);

/* ---- rendering ---- */
function setLang(l){
  lang = l;
  document.getElementById('btnJa').classList.toggle('active', l==='ja');
  document.getElementById('btnEn').classList.toggle('active', l==='en');
  document.documentElement.lang = l;
  renderStatic(); render(); tick();
}

function renderStatic(){
  const t = ui[lang];
  document.getElementById('demoBanner').innerHTML = liveData ? t.liveBanner(professors.length) : t.banner;
  document.getElementById('eyebrow').textContent = t.eyebrow;
  document.getElementById('heroTitle').innerHTML = t.title;
  document.getElementById('heroLede').textContent = t.lede;
  document.getElementById('searchBox').placeholder = t.searchPlaceholder;
  document.getElementById('howtoTitle').innerHTML = t.howtoTitle;
  document.getElementById('howtoSub').textContent = t.howtoSub;
  document.getElementById('footerText').textContent = t.footer;

  document.getElementById('questionChips').innerHTML = t.chipsLabel.map(q =>
    `<button class="chip" onclick="useQuestion(this)">${q}</button>`).join('');

  document.getElementById('steps').innerHTML = t.steps.map(s =>
    `<div class="step"><div class="step-tag">${s.tag}</div><h3>${s.h}</h3><p>${s.p}</p></div>`).join('');

  const f = t.fields;
  document.getElementById('fieldFilters').innerHTML =
    `<span class="label">${t.fieldLabel}</span>` + Object.keys(f).map(k =>
    `<button class="chip ${activeField===k?'active':''}" onclick="setField('${k}')">${f[k]}</button>`).join('');

  const r = t.regions;
  document.getElementById('regionFilters').innerHTML =
    `<span class="label">${t.regionLabel}</span>` + Object.keys(r).map(k =>
    `<button class="chip ${activeRegion===k?'active':''}" onclick="setRegion('${k}')">${r[k]}</button>`).join('');
}

function useQuestion(btn){
  document.getElementById('searchBox').value = btn.textContent;
  render();
  document.getElementById('grid').scrollIntoView({behavior:'smooth', block:'start'});
}
function setField(k){ activeField = k; renderStatic(); render(); }
function setRegion(k){ activeRegion = k; renderStatic(); render(); }

/* かんたん検索:問い・要約・タグを横断、単純な部分一致+キーワード連想 */
const synonyms = {
  '眠': 'life', 'sleep': 'life', '脳': 'life', 'brain': 'life', '老': 'life',
  'ai': 'ai', 'ゲーム': 'ai', 'game': 'ai', '友だち': 'ai', 'friend': 'ai',
  '海': 'earth', 'ocean': 'earth', '気候': 'earth', 'climate': 'earth', '地震': 'earth',
  'お金': 'society', 'money': 'society', '幸': 'society', 'happi': 'society', 'sns': 'society',
  'ことば': 'humanities', '言': 'humanities', 'language': 'humanities', 'word': 'humanities', '物語': 'humanities', 'stor': 'humanities',
  '宇宙': 'space', 'universe': 'space', '火星': 'space', 'mars': 'space', '光': 'space'
};

function render(){
  const t = ui[lang];
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  let hintField = null;
  for (const key in synonyms){ if (q && q.includes(key)) { hintField = synonyms[key]; break; } }

  const hits = professors.filter(p => {
    if (activeField !== 'all' && p.field !== activeField) return false;
    if (activeRegion !== 'all' && p.region !== activeRegion) return false;
    if (!q) return true;
    const hay = [p.toi.ja, p.toi.en, p.sum.ja, p.sum.en, p.aff.ja, p.aff.en,
                 ...p.tags.ja, ...p.tags.en].join(' ').toLowerCase();
    return hay.includes(q) || p.field === hintField;
  });

  document.getElementById('resultCount').textContent = t.results(hits.length);

  const grid = document.getElementById('grid');
  if (!hits.length){
    grid.innerHTML = `<div class="empty"><div class="big">${t.emptyBig}</div><div>${t.emptyText}</div></div>`;
    return;
  }
  grid.innerHTML = hits.map(p => `
    <article class="card">
      <div class="toi">${p.toi[lang]}</div>
      ${p.archived ? `<div class="archive-badge" title="${t.archiveNote}">⏸ ${t.archiveTag}</div>` : ''}
      <div class="who"><b>${p.name[lang]}</b><br>${p.aff[lang]}${p.moved_to ? `<br><span class="moved">${t.movedTo(p.moved_to.name_en)}</span>` : ''}</div>
      <div class="summary">${p.sum[lang]}</div>
      <div class="tags">${p.tags[lang].map(tg => `<span class="tag">${tg}</span>`).join('')}</div>
      <div class="sources">
        <div class="src-label">${t.srcLabel}</div>
        ${p.sources.map(s => `<a href="${s.url}" target="_blank" rel="noopener">${s.label}</a>`).join(' · ')}
        <span class="checked">${t.checked(p.checked)}</span>
      </div>
    </article>`).join('');
}


/* ===================================================
   「もっと見る」— OpenAlexからブラウザ直接取得
   AI要約なし・サーバーなし・完全無料
=================================================== */

// 取得済みOpenAlex機関ID → 取得済みページ数のキャッシュ
const loadedPages = {};
// 表示中の生データ研究者
let liveResearchers = {};  // univKey → [{...}]

// render()のあとに大学ごとの「もっと見る」ボタンを生成
function renderLiveSection(){
  const t = ui[lang];
  const section = document.getElementById('liveSection');
  section.innerHTML = '';

  // 現在の検索・フィルター結果から大学リストを抽出
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const univsInView = new Map();
  professors.forEach(p => {
    if(activeField !== 'all' && p.field !== activeField) return;
    if(activeRegion !== 'all' && p.region !== activeRegion) return;
    const key = p.aff ? (p.aff.en || p.aff.ja) : '';
    if(!key) return;
    if(!univsInView.has(key)) univsInView.set(key, {
      name_ja: p.aff.ja || key,
      name_en: p.aff.en || key,
      openalex_id: p.openalex_institution_id || null,
      count: 0
    });
    univsInView.get(key).count++;
  });

  // 大学別セクションを生成(5件以上ヒットした大学のみ「もっと見る」を出す)
  univsInView.forEach((univ, key) => {
    const wrap = document.createElement('div');
    wrap.className = 'univ-section';
    wrap.id = 'usec-' + btoa(encodeURIComponent(key)).replace(/[^a-z0-9]/gi,'').slice(0,20);

    const existing = (liveResearchers[key] || []).length;
    if(existing === 0) return;  // まだ取得していない = ボタンだけ後で追加

    const grid = document.createElement('div');
    grid.className = 'live-grid';
    (liveResearchers[key] || []).forEach(r => {
      grid.insertAdjacentHTML('beforeend', rawCard(r, t));
    });
    wrap.appendChild(grid);
    section.appendChild(wrap);
  });
}

function rawCard(r, t){
  const topics = (r.topics || []).slice(0,4).join(' · ') || '—';
  const oaUrl = `https://openalex.org/${r.id || ''}`;
  return `<article class="raw-card">
    <div class="rc-name">${r.display_name || '—'}</div>
    <div class="rc-topics">${t.rawTopics}: ${topics}</div>
    <div class="rc-note">${lang==='ja'?'AI要約はまだありません — 数日後に自動生成されます':'No AI summary yet — will be generated automatically in a few days'}</div>
    <div class="rc-src">
      <a href="${oaUrl}" target="_blank" rel="noopener">OpenAlex</a>
      ${r.orcid ? ` · <a href="${r.orcid}" target="_blank" rel="noopener">ORCID</a>` : ''}
      <span class="checked">&nbsp;— ${lang==='ja'?'今日取得':'fetched today'}</span>
    </div>
  </article>`;
}

// 大学名→OpenAlex機関IDを検索して取得
async function fetchInstId(univName){
  const url = `https://api.openalex.org/institutions?search=${encodeURIComponent(univName)}&filter=country_code:JP&per_page=1`;
  try{
    const d = await fetch(url).then(r=>r.json());
    return d.results?.[0]?.id?.split('/').pop() || null;
  }catch(e){ return null; }
}

// 機関IDから研究者を25人取得
async function fetchResearchers(instId, page=1){
  const url = `https://api.openalex.org/authors?filter=last_known_institutions.id:${instId},works_count:>10&sort=cited_by_count:desc&per_page=25&page=${page}`;
  try{
    const d = await fetch(url).then(r=>r.json());
    return d.results || [];
  }catch(e){ return []; }
}

// 「もっと見る」ボタンがクリックされたとき
async function loadMoreResearchers(btn, univKey, univNameEn){
  const t = ui[lang];
  btn.disabled = true;
  btn.classList.add('loading');

  let instId = loadedPages[univKey]?.instId;
  if(!instId){
    instId = await fetchInstId(univNameEn);
    if(!instId){
      btn.textContent = t.noMore;
      btn.disabled = true;
      return;
    }
    loadedPages[univKey] = { instId, page: 0 };
  }

  const nextPage = (loadedPages[univKey].page || 0) + 1;
  const results = await fetchResearchers(instId, nextPage);

  if(!results.length){
    btn.classList.remove('loading');
    btn.textContent = t.noMore;
    btn.disabled = true;
    return;
  }

  loadedPages[univKey].page = nextPage;
  if(!liveResearchers[univKey]) liveResearchers[univKey] = [];
  liveResearchers[univKey].push(...results);

  // セクションをレンダリング
  const sectionId = 'usec-' + btoa(encodeURIComponent(univKey)).replace(/[^a-z0-9]/gi,'').slice(0,20);
  let section = document.getElementById(sectionId);
  if(!section){
    section = document.createElement('div');
    section.className = 'univ-section';
    section.id = sectionId;
    const header = document.createElement('div');
    header.className = 'univ-section-header';
    header.innerHTML = `<h2>${lang==='ja'?univKey:univNameEn} — ${lang==='ja'?'OpenAlex生データ':'OpenAlex live data'}</h2>`;
    section.appendChild(header);
    const grid = document.createElement('div');
    grid.className = 'live-grid';
    grid.id = sectionId + '-grid';
    section.appendChild(grid);
    btn.closest('.load-more-wrap')?.before(section);
  }

  const grid = document.getElementById(sectionId + '-grid') || section.querySelector('.live-grid');
  results.forEach(r => grid.insertAdjacentHTML('beforeend', rawCard(r, t)));

  btn.classList.remove('loading');
  btn.disabled = false;
  btn.querySelector('.btn-text').textContent =
    `▼ ${lang==='ja'?'さらに読み込む':'Load more'} (${liveResearchers[univKey].length}${lang==='ja'?'人取得済み':' loaded'})`;
}

// render()のあとに各大学の「もっと見る」ボタンを差し込む
function appendLoadMoreButtons(){
  const t = ui[lang];
  // 現在表示中のカードから大学を収集
  const cards = document.querySelectorAll('#grid .card, #grid article');
  const seen = new Set();
  const univs = [];
  professors.filter(p => {
    if(activeField !== 'all' && p.field !== activeField) return false;
    if(activeRegion !== 'all' && p.region !== activeRegion) return false;
    return true;
  }).forEach(p => {
    const key = (p.aff?.en || p.aff?.ja || '');
    if(key && !seen.has(key)){
      seen.add(key);
      univs.push({ key, name_en: p.aff?.en || key, name_ja: p.aff?.ja || key });
    }
  });

  // 既存ボタンを削除
  document.querySelectorAll('.load-more-wrap').forEach(el => el.remove());

  // グリッドの後に大学ごとのボタンを追加
  const grid = document.getElementById('grid');
  univs.forEach(u => {
    const wrap = document.createElement('div');
    wrap.className = 'load-more-wrap';
    wrap.style.cssText = 'max-width:1080px;margin:0 auto;padding:0 20px 8px;';
    wrap.innerHTML = `
      <button class="load-more-btn" onclick="loadMoreResearchers(this,'${u.key.replace(/'/g,"\'")}','${u.name_en.replace(/'/g,"\'")}')">
        <span class="spinner"></span>
        <span class="btn-text">+ ${lang==='ja'?u.name_ja:u.name_en} の研究者をもっと見る (OpenAlex)</span>
      </button>`;
    grid.after(wrap);
  });
}

document.getElementById('searchBox').addEventListener('input', () => { render(); appendLoadMoreButtons(); });

renderStatic(); render(); appendLoadMoreButtons(); tick(); loadLive();
